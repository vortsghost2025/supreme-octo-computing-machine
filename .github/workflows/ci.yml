name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [20, 22, 23]
    defaults:
      run:
        working-directory: ./kilocode/packages/opencode
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install kilocode dependencies
        run: npm ci
      - name: Install integrated-swarm dependencies
        run: npm ci
        working-directory: ./integrated-swarm
      - name: Run tests
        run: npm test
