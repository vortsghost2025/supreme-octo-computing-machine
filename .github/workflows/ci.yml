name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22, 23]
    defaults:
      run:
        working-directory: ./kilocode/packages/opencode
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install opencode dependencies
        run: npm ci
      - name: Install integrated-swarm dependencies
        working-directory: ./integrated-swarm
        run: npm ci
      - name: Build integrated-swarm
        working-directory: ./integrated-swarm
        run: npm run build
      - name: Install UI package dependencies
        run: npm ci
        working-directory: ../../../ui
      - name: Start Vite dev server
        run: npm run dev &
        working-directory: ../../../ui
        env:
          OLLAMA_BASE_URL: http://host.docker.internal:11434
          VITE_API_URL: http://localhost:9002
      - name: Wait for Vite server
        run: sleep 5
      - name: Run tests
        run: npm test
