# SNAC-v2 Docker Compose
# Full stack: PostgreSQL, Redis, Qdrant, Backend, Frontend, Nginx

version: "3.9"
services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: snac_db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_USER: snac
      POSTGRES_DB: snac
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snac"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - snac_network

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: snac_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - snac_network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: snac_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - snac_network

  # Backend API
  backend:
    build: ./backend
    container_name: snac_backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3:8b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - snac_network

  # Frontend/Cockpit UI
  frontend:
    build: ./ui
    container_name: snac_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - snac_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: snac_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - snac_network

  # Web IDE (code-server / VS Code in browser)
  snac-ide:
    image: codercom/code-server:4.96.2
    container_name: snac_ide
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - PASSWORD=${IDE_PASSWORD:?Set IDE_PASSWORD in .env}
    volumes:
      - ./:/home/coder/project
      - code_server_data:/home/coder/.local
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || curl -f http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - snac_network

# Kilo gateway
  kilo-gateway:
    image: ghcr.io/vorts/kilo-gateway:latest
    container_name: kilo-gateway
    restart: unless-stopped
    ports:
      - "3002:3002"
      - "9001:9001"
    environment:
      - KILO_CONFIG=/app/kilo.json
    volumes:
      - ./.kilo:/app/.kilo
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Agent workers
  agent-orchestrator:
    build: ./services/agent-orchestrator
    container_name: agent-orchestrator
    restart: unless-stopped
    env_file: ./services/agent-orchestrator/.env
    depends_on:
      - kilo-gateway
    networks:
      - snac_network

  agent-builder:
    build: ./services/agent-builder
    container_name: agent-builder
    restart: unless-stopped
    env_file: ./services/agent-builder/.env
    depends_on:
      - kilo-gateway
    networks:
      - snac_network

  agent-reviewer:
    build: ./services/agent-reviewer
    container_name: agent-reviewer
    restart: unless-stopped
    env_file: ./services/agent-reviewer/.env
    depends_on:
      - kilo-gateway
    networks:
      - snac_network

  agent-monitor:
    build: ./services/agent-monitor
    container_name: agent-monitor
    restart: unless-stopped
    env_file: ./services/agent-monitor/.env
    depends_on:
      - kilo-gateway
    networks:
      - snac_network

  agent-nvidia:
    build: ./services/agent-nvidia
    container_name: agent-nvidia
    restart: unless-stopped
    env_file: ./services/agent-nvidia/.env
    depends_on:
      - kilo-gateway
    networks:
      - snac_network

  agent-azure-coordinator:
    build: ./services/agent-azure-coordinator
    container_name: agent-azure-coordinator
    restart: unless-stopped
    env_file: ./services/agent-azure-coordinator/.env
    depends_on:
      - kilo-gateway
    networks:
      - snac_network

volumes:
  postgres_data:
  qdrant_data:
  code_server_data:

networks:
  snac_network:
    driver: bridge