# SNAC-v2 Docker Compose
# Full stack: PostgreSQL, Redis, Qdrant, Backend, Frontend, Nginx, Free Agent
#
# Canonical container names (only these should be running under snac_network):
#   snac_db  snac_redis  snac_qdrant  snac_backend  snac_frontend  snac_nginx  snac_free_agent
#
# IMPORTANT: always deploy with --remove-orphans to stop stray containers that
# are not defined here.  Example:
#   docker compose up -d --remove-orphans
#   docker compose pull && docker compose up -d --build --remove-orphans

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: snac_db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_USER: snac
      POSTGRES_DB: snac
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snac"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - snac_network

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: snac_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - snac_network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: snac_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - snac_network

  # Backend API
  backend:
    build: ./backend
    container_name: snac_backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - snac_network

  # Frontend/Cockpit UI
  frontend:
    build: ./ui
    container_name: snac_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - snac_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: snac_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - snac_network

  # Free Coding Agent (Node.js + MCP tools)
  # Provides /health, /tools, /run endpoints on port 3001.
  # MCP servers (GitHub, Brave, postgres) are optional — missing env vars
  # cause those servers to be skipped, not crash the container.
  free_agent:
    build: ./backend/free-coding-agent
    container_name: snac_free_agent
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PORT=3001
      - WORKING_DIR=/workspace
    volumes:
      - free_agent_workspace:/workspace
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - snac_network

volumes:
  postgres_data:
  qdrant_data:
  free_agent_workspace:

networks:
  snac_network:
    driver: bridge
